# Theme file for HoustonPatchbay
# guideline: http://raysession.tuxfamily.org/manuals/patchbay/en/theme_edit.html

[Theme]
name = Black Gold
name[fr] = Or noir

[aliases]
decorations = #ffc000
audio = #282830
midi = #4d2a10
cv = #141419
alsa = #2b5e50
video = #1a061a
boxy = #181814

[body]
background = #000000
monitor-color = #be9e00
# hardware-rack-width = 6

[box_wrapper]
border-color = #38393a
background = decorations * 0.6

[rubberband]
border-color = #cecfd0
background = #554c4d4e

[box]
font-name = Ubuntu
background = boxy
background2 = boxy * 0.9
# background = #141414
# background2 = #1a1815
# border-color = #4c4d4e * 0.6
border-color = boxy * 2.0
border-radius = 6
text-color = #d2d2d2
font-size = 11
font-width = 75

[box.selected]
border-color = #cecfd0
border-style = dash

[box.hardware]
border-radius = 0

[box.client]
port-out-offset = 2

[port]
text-color = #c8c8c8
font-name = Ubuntu
font-size = 11
font-width = 50

[port.audio]
border-color = #645100
border-width = 0.8
background = audio

[port.audio.selected]
background = #c6a150
text-color = audio

[port.midi]
border-color = #2b1709
background = midi
text-color = #ffff96

[port.midi.selected]
background = #a05621

[port.cv]
border-color = #645100
background = cv

[port.cv.selected]
background = #c6a150 * 0.9
text-color = audio * 0.5

[port.alsa]
background = alsa
border-color = alsa * 0.5

[port.alsa.selected]
background = alsa * 1.2
border-color = alsa * 2.0

[port.video]
background = video
border-color = #ffff96 * 0.6
text-color = #ffff96 * 0.8

[port.video.selected]
background = video * 2.0
border-color = #ffff96 * 0.8
text-color = #ffff96 * 1.0

[portgroup]
inherits = port

[portgroup.audio]
background = audio * 0.75
# text-color = #ddd

[portgroup.audio.selected]
background = #d1aa56
text-color = #19191e


[line]
border-width = 1.75

[line.disconnecting]
background = #1e1e1e
border-width = 1.5

[line.selected]
border-width = 2.25

[line.audio]
background = #3c3c48

[line.audio.selected]
background = #76768d

[line.midi]
background = midi

[line.midi.selected]
background = #a05621

[line.alsa]
background = alsa

[line.alsa.selected]
background = alsa * 2.0

[line.video]
background = video * 1.4

[line.video.selected]
background = video * 2.0

# [hardware_rack]
# background = #3c3c2b
# background2 = #282818
# border-color = #1e1e1e

[hardware_rack]
background = transparent
# background = boxy * 2.0
# background2 = boxy * 2.2
# border-color = #1e1e1e
border-color = boxy * 1.5
# border-style = none

[gui_button.gui_visible]
background = #55fff0b4 * 0.8
border-style = nopen
border-radius = 6

[gui_button.gui_hidden]
background = transparent
border-color = #fff0b4 * 0.4
border-style = dash
border-radius = 6

[monitor_decoration]
background = #464646 * 0.6
background2 = #2d2d2d * 0.6
border-style = nopen

[box_header_line]
border-color = decorations * 0.8

[grid]
border-color = #0a0a0a
border-width = 0.5

[grid.grid]
border-width = 1.0

[grid.chessboard]
border-color = #040404