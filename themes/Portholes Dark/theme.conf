[Theme]
name = Portholes Dark
name[fr] = Portrous sombre

[aliases]
decorations = #ffc000
box_border = #2e2e2f
audio = #bbccee
midi = #e6a899
cv = #90d0ff
alsa = #9c9642
video = #c77b99

[body]
background = #181818
monitor-color = #be9e00
port-height = 15
thumbnail_port_colors = text
# box-spacing = 0
# hardware-rack-width = 0

[box_wrapper]
border-width = 1
border-color = #4c4d4e * 0.6
background = decorations * 0.6

[rubberband]
border-color = #cecfd0
background = #4c4d4e ** 0.33

[box]
background = #666 ** 0.8
background2 = #888 ** 0.8
# background = #3c3c3c * 1.3 ** 0.80
# background2 = #403e3c * 1.5 ** 0.80
border-color = box_border
# border-color = yellow ** 0.3
border-radius = 6
border-width = 5
text-color = #d2d2d2
# text-color = #111
font-name = Ubuntu
font-width = 75
port-offset = 2
port-offset-mode = nothing

[box_header]
visible = true
background = box_border
border-style = none
border-color = blue
border-sides = top|sides
margin = 0
# margin-top = 38
margin-top = -5
margin-bottom = 2
margin-ports-side = 0
margin-top-side = -3
# margin-sides = -5
# margin-free-side = -5

# margin-free-side = 14

# [box_header.hardware]
# background = #665599 * 0.4 ** 0.8
# background2 = #665599 * 0.6 ** 0.8

[box_header.hardware]
margin = 0
margin-top = 3
margin-bottom = 3
margin-ports-side = 4

[box_header.client]
margin-ports-side = 10

[box_header.monitor]
margin = 0
margin-top = -2
margin-bottom = 2

[box_ports_border]
visible = False
border-color = box_border
border-width = 4

[box_ports_border.hardware]
visible = True

[box_ports_border.monitor]
visible = True

[box.selected]
border-color = #cecfd0
border-style = dash
border-width = 2

[box.hardware]
border-radius = 0
border-width = 0
border-mode = ports_side
# border-style = nopen

[box.hardware.selected]
border-width = 3

[box.client]
# border-radius = 6
text-color = #222
# background = #666 ** 1.0
# background2 = #888

[box.monitor]
border-color = #664422 * 1.2 ** 0.6
border-width = 2
# background = black

[port]
font-name = Ubuntu
border-color = box_border
# border-color = audio
# border-mode = minimal
background = box_border
font-size = 11
font-width = 50
output-align = right

[port.selected]
text-color = box_border

[port.audio]
text-color = audio

[port.audio.selected]
background = audio
text-color = box_border

[port.midi]
text-color = midi

[port.midi.selected]
background = midi
text-color = box_border

[port.cv]
text-color = cv

[port.cv.selected]
background = cv
text-color = box_border

[port.alsa]
text-color = alsa

[port.alsa.selected]
background = alsa
text-color = box_border

[port.video]
text-color = video

[port.video.selected]
background = video
text-color = box_border

[portgroup]
inherits = port

[line]
border-width = 1.75

[line.disconnecting]
background = #1e1e1e
border-width = 1.5

[line.selected]
border-width = 2.25

[line.audio]
background = audio * 0.5
background2 = audio * 0.6

[line.audio.selected]
background = audio

[line.midi]
background = midi

[line.midi.selected]
background = midi * 1.3

[line.alsa]
background = alsa

[line.alsa.selected]
background = alsa * 1.9

[line.video]
background = video

[line.video.selected]
background = video * 1.4

[hardware_rack]
background = #3c3c2b * 1.4 ** 0.0
background2 = #282818 * 1.4 ** 0.0
# border-color = box_border
border-color = #777
border-width = 1.0

[gui_button]
margin = 0
margin-top = 5
margin-bottom = 5
margin-sides = 0
margin-ports-side = -4
margin-top-side = 5
border-color = box_border
# border-style = none
border-width = 2
border-radius = 6

[gui_button.gui_visible]
background = #ddd

[gui_button.gui_hidden]
background = #888

[monitor_decoration]
# background = #3c3c3c * 2.5 ** 0.2
# background2 = #403e3c * 2.5 ** 0.2
# background = #cc6600 ** 0.35
# background2 = #bb4400 ** 0.35
background = #664422 ** 0.6
# background2 = #664400
border-style = nopen
border-color = decorations ** 0.15
# border-mode = minimal

[box_header_line]
border-color = decorations * 0.8
border-width = 1

[grid]
border-color = #202020
border-width = 0.5

[grid.grid]
border-width = 1.0
border-color = #1c1c1c
grid-min-width = 100
grid-min-height = 100

[grid.chessboard]
border-color = #1b1b1b

