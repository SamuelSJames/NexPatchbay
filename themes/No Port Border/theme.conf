# Theme file for HoustonPatchbay
# guideline: http://raysession.tuxfamily.org/manuals/patchbay/en/theme_edit.html

[Theme]
Name=No Port Border
Name[fr]=Ports sans bordure

[aliases]
# decorations=#ffc000
decorations = #d3d3d3
transparent=#00000000
audio= #0088cc * 0.8
midi= #904f20 * 1.4
cv = #6677cc * 1.2
alsa= #4d9c42
video= #660028 * 1.4
audiotext = #33BBFF
videotext=#ddaab0

[body]
background=#181818
port-offset=0
box-shadow-color=#595959
monitor-color=#be9e00
thumbnail_port_colors = border
# hardware-rack-width = 8

[box_wrapper]
border-color = transparent
background= decorations * 0.8

[rubberband]
border-color=#cecfd0
background=#554c4d4e

[box]
background= #181818 ** 0.8
# background2= rgb(48, 48, 48) * 1.1
border-color=#4c4d4e * 0.6 ** 0.0
border-radius=2
text-color=#e1e1e1
font-name = DejaVu Sans Mono
font-size=12
font-width=75
port-in-offset = -1
port-out-offset = -1

[box.selected]
# background=#202020
# background2=#404040
border-color= #555555
border-style=dashdot

[box.client]
port-out-offset = 4
port-in-offset = 4

[box.hardware]
port-out-offset = 0
port-in-offset = 0
# [box.hardware]
# border-radius=0

# [box.client]
# border-radius=3
# text-color= #111111

[port]
shape = minimalist
text-color=#d2d2d2
font-name = DejaVu Sans Mono
font-size=11
font-width=50
# border-width=2.0
background= #181818 ** 0.5
output-align = right
# background=#12808080

# [port.selected]
# text-color = #d2d2d2
# border-width=1.0
# background=#40ffffff

[port.audio]
# border-color=#8f7700
border-color = audio
text-color = audiotext

# border-width=1.4
# background=#a5a5a5

# [port.audio.selected]


[port.audio.selected]
# border-width=1.4
background = audio ** 0.25
text-color = #d2d2d2
# text-color=#282830

[port.midi]
# border-color=#2b1709
border-color = midi
text-color = midi * 1.5
# background=#4d2a10

[port.midi.selected]
background= midi ** 0.25
text-color = #d2d2d2
# text-color=#ffff96

[port.cv]
border-color= cv
text-color = cv * 1.1
# background=#a5a5a5

[port.cv.selected]
background= cv ** 0.25
text-color = #d2d2d2

[port.alsa]
border-color=alsa
text-color = alsa * 1.2
# background=alsa

[port.alsa.selected]
background=alsa ** 0.25
text-color = #d2d2d2
# text-color=#302000

[port.video]
border-color=video
text-color = video * 1.5
# background=video * 0.4
# background2=video * 0.3
# text-color=videotext

[port.video.selected]
background=video ** 0.25

[portgroup]
# border-color=#8f7700
shape = minimalist
border-color=audio
# background=#b9b9b9
# background=#12ffffff
background = #181818 **0.5
font-name = DejaVu Sans Mono

# text-color=#19191e
# text-color= audiotext
output-align = right

[portgroup.selected]
background=#d1aa56
# border-color=#8f7700
# text-color=#19191e

[portgroup.audio]
text-color = audiotext
# border-width=1.4

[portgroup.audio.selected]
background = audio ** 0.25
text-color = #d2d2d2

[portgroup.midi]
border-color=#2b1709
border-width=1.5

[portgroup.alsa]
border-color=alsa * 0.8
border-width=1.5

[portgroup.alsa.selected]
border-color=alsa * 1.5

[portgroup.video]
border-color=video
background=video * 0.3
text-color=videotext

[portgroup.video.selected]
background=video * 0.5
border-color=video * 1.5
text-color=videotext * 1.2

[line]
border-width=1.75

[line.disconnecting]
background=#1e1e1e
border-width=1.5

[line.selected]
border-width=2.25

[line.audio]
# background=#646464
# background2=#646464 * 0.9
background = audio
background2 = audio * 0.9

[line.audio.selected]
# background=#c6a150
background = audio * 1.5

[line.midi]
background= midi

[line.midi.selected]
background= midi * 1.6

[line.alsa]
background=alsa

[line.alsa.selected]
background=alsa * 1.9

[line.video]
background=video

[line.video.selected]
background=video * 1.5

[hardware_rack]
shape = minimalist
background= transparent
# background2=#282818 * 1.4
border-color= #555555
# border-color = transparent

[gui_button.gui_visible]
# background=#55fff0b4 * 0.7
background = #383838
border-style=nopen
border-radius=0

[gui_button.gui_hidden]
# background=#181818 * 1.5
background = #1f1f1f
border-style=nopen
border-radius=0

[monitor_decoration]
# background=#3a382d * 1.5 ** 0.6
# background = #ffd700 * 0.2 ** 0.25
background = transparent
border-color = #887700 ** 0.50
border-width = 1.0
shape=minimalist
# background2=#2a2822 * 1.5 ** 0.6
# border-style=nopen

[box_header_line]
border-color=decorations * 0.8
border-width=1

[grid]
border-color=#202020
border-width=0.5

[grid.grid]
border-width=1.0
border-color=#1c1c1c
grid-min-width=100
grid-min-height=100

[grid.chessboard]
border-color=#1b1b1b
