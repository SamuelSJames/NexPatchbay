# Theme file for HoustonPatchbay
# guideline: http://raysession.tuxfamily.org/manuals/patchbay/en/theme_edit.html

[Theme]
Name=No Port Border
Name[fr]=Ports sans bordure

[aliases]
decorations=#ffc000
transparent=#00000000
audio=#0088cc * 0.8
midi=#2b1709
alsa=#9c9642
video=#44001a
videotext=#ddaab0

[body]
background=#181818
port-offset=0
box-shadow-color=#595959
monitor-color=#be9e00

[box_wrapper]
border-color=#38393a
background=decorations * 0.6

[rubberband]
border-color=#cecfd0
background=#554c4d4e

[box]
background=#303030
# background2=#2b2b2b
border-color=#4c4d4e * 0.6
border-radius=2
text-color=#d2d2d2
font-name=Ubuntu
font-size=12
font-width=75

[box.selected]
# background=#202020
# background2=#404040
border-color=#cecfd0 * 0.7
border-style=dash

[box.hardware]
border-radius=0

[box.client]
border-radius=3
text-color= #111111

[port]
text-color=#d2d2d2
# font-name=Ubuntu
font-size=11
font-width=50
border-width=2.0
background=transparent
# background=#12808080

[port.selected]
# border-width=1.0
background=#40ffffff

[port.audio]
# border-color=#8f7700
border-color = audio

# border-width=1.4
# background=#a5a5a5

# [port.audio.selected]


[port.audio.selected]
# border-width=1.4
background = audio ** 0.25
# text-color=#282830

[port.midi]
# border-color=#2b1709
border-color = #904f20
# background=#4d2a10

[port.midi.selected]
background=#a05621
text-color=#ffff96

[port.cv]
border-color=#645100
background=#a5a5a5

[port.cv.selected]
background=#c6a150

[port.alsa]
border-color=alsa * 0.8
background=alsa

[port.alsa.selected]
border-color=alsa * 1.5
background=alsa * 1.9
text-color=#302000

[port.video]
border-color=video
background=video * 0.4
background2=video * 0.3
text-color=videotext

[port.video.selected]
background=video * 0.6
background2=video * 0.5
border-color=video * 1.5
text-color=videotext * 1.2

[portgroup]
# border-color=#8f7700
border-color=transparent
# background=#b9b9b9
background=#12ffffff
# text-color=#19191e
text-color=#d2d2d2

[portgroup.selected]
background=#d1aa56
border-color=#8f7700
text-color=#19191e

[portgroup.audio]
border-width=1.4

[portgroup.midi]
border-color=#2b1709
border-width=1.5

[portgroup.alsa]
border-color=alsa * 0.8
border-width=1.5

[portgroup.alsa.selected]
border-color=alsa * 1.5

[portgroup.video]
border-color=video
background=video * 0.3
text-color=videotext

[portgroup.video.selected]
background=video * 0.5
border-color=video * 1.5
text-color=videotext * 1.2

[line]
border-width=1.75

[line.disconnecting]
background=#1e1e1e
border-width=1.5

[line.selected]
border-width=2.25

[line.audio]
# background=#646464
# background2=#646464 * 0.9
background = audio
background2 = audio * 0.9

[line.audio.selected]
# background=#c6a150
background = audio * 1.5

[line.midi]
background=#4d2a10

[line.midi.selected]
background=#a05621

[line.alsa]
background=alsa

[line.alsa.selected]
background=alsa * 1.9

[line.video]
background=video

[line.video.selected]
background=video * 1.5

[hardware_rack]
background=transparent
# background2=#282818 * 1.4
border-color=#4e4e4e

[gui_button.gui_visible]
# background=#55fff0b4 * 0.7
background = #bbbbbb
background2 = #dddddd
border-style=nopen
border-radius=3

[gui_button.gui_hidden]
# background=#181818 * 1.5
background = #666666
border-color=#fff0b4 * 0.4
border-style=nopen
border-radius=3

[monitor_decoration]
# background=#3a382d * 1.5 ** 0.6
background = #40000000
# background2=#2a2822 * 1.5 ** 0.6
border-style=nopen

[box_header_line]
border-color=decorations * 0.8
border-width=1

[grid]
border-color=#202020
border-width=0.5

[grid.grid]
border-width=1.0
border-color=#1c1c1c
grid-min-width=100
grid-min-height=100

[grid.chessboard]
border-color=#1b1b1b
