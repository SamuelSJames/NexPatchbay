# Theme file for HoustonPatchbay
# guideline: http://raysession.tuxfamily.org/manuals/patchbay/en/theme_edit.html

[Theme]
name = Dark Boards
name[fr] = Planches sombres

[aliases]
audio = #345578
midi = #6d4565
cv = #7a91ce
alsa = #0c1a16
video = #9a8200
text_normal = #dddddd
decorations = #ffd700
deco_border = #707070

[body]
 # this background comes from MOD-UI background
background-image = background.jpg
background = #000 ** 0.33
monitor-color = #be9e00 * 0.7

[box]
font-name = Roboto Condensed Medium
font-size = 12
font-weight = bold
background = #666 ** 0.5
background2 = #777 ** 0.5
border-color = deco_border
border-radius = 2
border-width = 1.5
text-color = #ccc
port-offset = 3

[box.hardware]
font-size = 13
port-offset = 0
border-radius = 0
background = #222222 ** 0.5
background2 = #222222 ** 0.38
border-style = nopen
border-width = 0
text-color = #d7d7aa * 0.9

[box.hardware.selected]
border-style = normal
border-color = deco_border

[box.selected]
border-color = deco_border * 1.5
border-style = dash

[box.client]
port-in-offset = 2
port-out-offset = 2
border-radius = 8

[box_wrapper]
border-color = deco_border
background = decorations * 0.7

[box_wrapper.client]
background = decorations * 0.5

[box_shadow]
background = #444444 ** 0.56

[port]
font-name = Roboto Medium
font-size = 10
text-color = text_normal
border-color = deco_border * 0.85

[port.selected]
text-color = text_normal * 1.2

[port.audio]
background = audio

[port.audio.selected]
background = audio * 1.4
border-color = audio * 1.4

[port.midi]
background = midi * 0.8
border-color = midi * 0.6

[port.midi.selected]
background = midi * 1.3

[port.cv]
border-color = #222
background = cv
text-color = #222

[port.cv.selected]
background = cv * 1.4

[port.alsa]
background = alsa

[port.alsa.selected]
background = alsa * 2.0

[port.video]
background = video
text-color = #222

[port.video.selected]
background = video * 1.6
background2 = video * 2.0

[portgroup]
font-name = Roboto Medium
font-size = 11
border-color = deco_border * 0.85
background = #333
text-color = #ccc

[portgroup.selected]
background = #666
text-color = #eee

[portgroup.midi]
border-color = midi * 0.6

[portgroup.cv]
border-color = #222

[line]
border-width = 2.0

[line.disconnecting]
background = #bbbbbb ** 0.19
border-width = 1.0

[line.selected]
border-width = 2.5

[line.audio]
background = audio * 0.8 ** 0.8
background2 = audio * 0.8 ** 0.6

[line.audio.selected]
background = audio * 1.1

[line.midi]
background = midi * 0.9
background2 = midi * 0.8

[line.midi.selected]
background = midi * 1.4

[line.alsa]
background = alsa * 2.5

[line.alsa.selected]
background = alsa * 6

[line.video]
background = video

[line.video.selected]
background = video * 2.0

[hardware_rack]
background = #000 ** 0.13
border-color = #777
border-width = 0.8

[hardware_rack.selected]
border-color = deco_border * 1.5
border-style = dash
border-width = 1

[gui_button.gui_visible]
background = #333029 ** 0.47 * 3.2
border-style = nopen
border-radius = 4

[gui_button.gui_hidden]
background = #333020 ** 0.47
border-color = #888
border-radius = 4
border-style = none

[monitor_decoration]
background = #333333 ** 0.42
border-style = nopen

[box_header_line]
border-color = decorations * 0.7

[rubberband]
border-color = #ffffff ** 0.47
border-width = 1.5
background = text_normal ** 0.15

[grid]
border-color = #202020
border-width = 0.5

[grid.grid]
border-width = 2.0
border-color = #444444 ** 0.13
grid-min-width = 100
grid-min-height = 100

[grid.chessboard]
border-color = #404040 ** 0.07

